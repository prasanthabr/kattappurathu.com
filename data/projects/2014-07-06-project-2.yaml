description: "We belong to Thiruvalla, in Pathanamthitta District. The name Thiruvalla is a colloquial form of Sreevallabhapuram, named after the chief deity Sree Vallabha of Sreevallabha Temple here. It is a highly orthodox Hindu Temple dedicated to Purusha as Lord Sreevallabhan. It is one among the oldest and biggest Temples of Kerala and a major destination for devotees all over India for centuries. This is the only temple in Kerala where Kathakali, the folk art of Kerala, is performed as a ritual offering every night. Thiruvalla is famous for many other things also. It is the headquarters of the Malankara Marthoma Syrian Church that conducts the Maramon Convention, one of the largest Christian conventions in Asia at Maramon near Thiruvlla annually. Again, the Paliakara Church in Thiruvlla has some exquisite mural paintings on the walls of its sanctum sanatorium. Chakkulathukavu Sree Bhagavathy temple, where large number of women devotees assemble annully once for conducting pongla ritul is situated on the border of Pathanamthitta and Alappuzha districts at Neerettupuram."

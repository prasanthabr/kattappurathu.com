description: Aranmula, 23 kms from Idinjillam, is famous for Aranmula Kannadi (Aranmula Mirror), a unique handicraft product that is believed to have existed even during the Vedic period. The myth about its origin and its secret composition make it a truly fascinating product. It is made up of some undisclosed metals alloyed with silver, bronze, copper and tin. It is a precious inherited gift. The aura of secret behind its manufacture makes it all the more famous. Tradition links this craft closely with the ancient Aranmula Parthsarathy temple. Any write up on Aranmula will be imperfect without a mention of Plliodams, vachippattu and vallasadya. Palliyodams are Aranmula's unique snake boats (Chundan Vallam) which devotees hold in reverence, considering it as the divine vessel of the presiding deity in Sree Parthasarathy temple. Sitting two in row along the length of the Boat the oarsmen will row in rhythm of the vanchipattu (boatman's song) being sung by a group of experienced singers. Vallasadya is a ritualistic feast, done as a vazhipadu (offering) by the devotees to Lord Krishna, the presiding deity at the Sree Parthasarathy temple. It lasts for more than sixty days and with more than sixty exquisite dishes to relish. As part of the Vallasadya the crew of the selected snake-boat will be accorded a customary reception on their arrival to the temple ghat. They circumambulate the temple, singing Vanchippattu, songs of the boatmen in praise of Lord Parthasarathy, before being led to the temple Oottupura (dining hall) for the feast. As the feast progresses, the guests demand more rice and dishes by singing in the same style as that of Vanchippattu. This generates an ambience filled with fun, hurried activities and a flow of energy that is unique to Vallasadya. As many as 50 to 64 items are usually served during the course of this sumptuous feast. It is conducted usually during July-September every year.

description: "Konni, a forested village in the State of Kerala in South India, situated on the bank of the mighty Achencoil River has a long and rich history of man-forest interface. Vast expanse of forests of Western Ghats in the background is crisscrossed by numerous streams and rivulets, which add to the exceptional scenic beauty of the landscape. Konni Eco Tourism Project envisages developing visitor locations in the forest tracts of Konni-Achencoil forests and developing Konni Elephant Camp as a facilitation centre. Elephant is at the nucleus of the entire project. The facilities developed at Konni include elephant viewing, elephant feeding, elephant ride, watching elephant bath etc. An elephant museum, which is planned to be developed as a complete natural history museum based on elephant, also is set up. The elephant camp at Konni serves as a hub of forest-based eco tourism activities in southern Kerala. Various locations in forest areas also have been developed, which can be accessed through trekking in forests."

  # Services section
  [params.services]
    enable = true
    title = "What to Expect"
    subtitle = "Kattappurathu is an old bunglow directly on the MC Road, in the quaint little village of Idinzhillam. The property is teeming with life with fruit trees, flowering plants, a flurry of native birds (including, recently, a visting peahen), squirrels, an odd Iguania, a family of mongoose, a few proud Indian monitor lizards. In the fields and farm area behind and on either side of the property, one may encounter an odd native snake or turtles. We do encourage our guests to be accompanied while exploring our extended property, in case you are not familiar with native animals. <br><br> We take pride in being a green oasis in the middle of a fast developing region and try to celebrate life, and take care not to harm the animals that make our place their home. In addition, we keep various kinds of poultry as pets, and have an open air pond with fishes. <br> Apart from the bunglow, we have an adjecant free standing wooden granary that was once filled with grain from our fields. <br> Do visit with an open mind and savour in the sounds, smells and experiences of Central Tranvancore"

    [[params.services.row]]

    [[params.services.row.list]]

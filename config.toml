    # About section
  [params.about]
    enable = true
    title = "That Point on the Map!"
    subtitle = "Idinjillam is a small village connecting two growing towns of Changanachery and Thiurvalla, in the Central Travancore region of Kerala. To our west lie the plains and paddy fields of Kuttanad with its interweaving backwaters and rivers. To our east is the famed cardamom hills and forests of the western ghats.<br><br>Central Travancore is the seat of royalty and culture with quite a few unexplored gems of Kerala."
    endpoint = "Make it<br>part of your<br>story!"

    # The events will be listed from the top to the bottom.
    # All images are stored under 'static/img/about'.
    # Replace them with your own.
    [[params.about.events]]
      img = "1.jpg"
      date = "Aranmula"
      title = "The glass that isn't glass"
      description = "Aranmula, 23 kms from Idinjillam, is famous for Aranmula Kannadi (Aranmula Mirror), a unique handicraft product that is believed to have existed even during the Vedic period. The myth about its origin and its secret composition make it a truly fascinating product. It is made up of some undisclosed metals alloyed with silver, bronze, copper and tin. It is a precious inherited gift. The aura of secret behind its manufacture makes it all the more famous. Tradition links this craft closely with the ancient Aranmula Parthsarathy temple. Any write up on Aranmula will be imperfect without a mention of Plliodams, vachippattu and vallasadya. Palliyodams are Aranmula's unique snake boats (Chundan Vallam) which devotees hold in reverence, considering it as the divine vessel of the presiding deity in Sree Parthasarathy temple. Sitting two in row along the length of the Boat the oarsmen will row in rhythm of the vanchipattu (boatman's song) being sung by a group of experienced singers. Vallasadya is a ritualistic feast, done as a vazhipadu (offering) by the devotees to Lord Krishna, the presiding deity at the Sree Parthasarathy temple. It lasts for more than sixty days and with more than sixty exquisite dishes to relish. As part of the Vallasadya the crew of the selected snake-boat will be accorded a customary reception on their arrival to the temple ghat. They circumambulate the temple, singing Vanchippattu, songs of the boatmen in praise of Lord Parthasarathy, before being led to the temple Oottupura (dining hall) for the feast. As the feast progresses, the guests demand more rice and dishes by singing in the same style as that of Vanchippattu. This generates an ambience filled with fun, hurried activities and a flow of energy that is unique to Vallasadya. As many as 50 to 64 items are usually served during the course of this sumptuous feast. It is conducted usually during July-September every year."

    [[params.about.events]]
      img = "2.jpg"
      date = "Pallathuruthy"
      title = "The houseboats"
      description = "Pallathuruthy, famous for house boats is only 23 kms from our place. Different types of House Boats are available here to suit the purse of the tourist. Most of the house boats serve local delicacies like ‘Kappayum meen vevichathum’ (Tapioca and a special fish curry using kudampuli- an exclusive spice of Kuttanadu) and Karimeen pollichathu (A special fry of Pearlspot packed in banana leaves giving the preparation a rich aroma that arouses taste buds)."

    [[params.about.events]]
      img = "3.jpg"
      date = "Tiruvalla"
      title = "Kathakali throughout"
      description = "We belong to Thiruvalla, in Pathanamthitta District. The name Thiruvalla is a colloquial form of Sreevallabhapuram, named after the chief deity Sree Vallabha of Sreevallabha Temple here. It is a highly orthodox Hindu Temple dedicated to Purusha as Lord Sreevallabhan. It is one among the oldest and biggest Temples of Kerala and a major destination for devotees all over India for centuries. This is the only temple in Kerala where Kathakali, the folk art of Kerala, is performed as a ritual offering every night. Thiruvalla is famous for many other things also. It is the headquarters of the Malankara Marthoma Syrian Church that conducts the Maramon Convention, one of the largest Christian conventions in Asia at Maramon near Thiruvlla annually. Again, the Paliakara Church in Thiruvlla has some exquisite mural paintings on the walls of its sanctum sanatorium. Chakkulathukavu Sree Bhagavathy temple, where large number of women devotees assemble annully once for conducting pongla ritul is situated on the border of Pathanamthitta and Alappuzha districts at Neerettupuram."

    [[params.about.events]]

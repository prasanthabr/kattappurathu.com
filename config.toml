  # Services section
  [params.services]
    enable = true
    title = "What to Expect"
    subtitle = "Kattappurathu is an old bungalow facing the Main Central Road, in the quaint little village of Ezhinjillam (colloquially known as Idinjillam). <br> The property, though not very large, is teeming with life. Local fruit trees like mango, jack fruit, flowering plants that attract butterflies and dragon flies, a flurry of native birds (including, recently, a visiting peahen), squirrels, an odd Iguania, a family of mongoose and a few proud Indian monitor lizards add up to the ‘life’ in the property. Fish grown in a pond within the land and a few varieties of poultry may be treated as part of the family. The house overlooks paddy fields of Kuttanadu. In the fields and farm area behind the property, one may encounter a few turtles, owls and beetles. We do encourage our guests to explore our extended property and enjoy. <br><br>**Nature at its best**<br>We take pride in being a green oasis in the middle of a fast developing region, try to celebrate life, and take care not to harm the animals that make our place their home. As suggested earlier we keep few varieties of poultry as pets, and have an open air pond with fishes.<br>Apart from the bungalow, we have an adjacent free standing wooden granary (see the facing picture) that brings nostalgic memories of a grand era of farming in Kuttanad. Till recently we used to keep paddy cultivated in our fields in this granary. Now, we maintain it for our guest to see and our next generation to remember the toil of our ancestors.<br><br>We invite you to visit us with an open mind, be a Kuttanad farmer in spirit and savour in the sounds, smells, sights and experiences of Central Tranvancore."

    [[params.services.row]]

    [[params.services.row.list]]

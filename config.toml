    # About section
  [params.about]
    enable = true
    title = "That Point on the Map!"
    subtitle = "Idinzhillam is a small village in between two growing towns of Changennacherry and Triuvalla, in the Central Travancore region of Kerala. To our west lie the plains and paddy fields of Kuttanad with its interweaving backwaters and rivers. To our east the famed KK Road take us the cardamom hills and forests of the western ghats.<br><br>Central Travancore is the seat of royalty and culture with a quite a few unexplored gems of Kerala"
    endpoint = "Make it<br>part of your<br>story!"


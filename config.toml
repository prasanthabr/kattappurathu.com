# Site settings
baseurl = "http://kattappurathu.com/"
languageCode = "en-us"
title = "Kattappurathu | A slice of God's Own Travancore"
theme = "hugo-agency-theme"

# Enter your tracking code to enable Google Analytics
googleAnalytics = "UA-111622234-1"

[params]
  # You can use Markdown syntax for urls [text](//url.to/source) or
  # most longer texts.
  #
  # All icons using Fontawesome's icon font. Look at fortawesome.github.io/Font-Awesome/icons/
  # for more icons. The icons are represented by their corresponding
  # CSS class.

  # To provide some metadata for search engines feel free to add a few
  # information about you and your website.
  name = "Kattappurathu"
  description = "Our home is a home stay in the upper kuttanad region of central travancore in Kerala, India. A bunglow with character surrounded with fruit trees and flowering plants, on MC Road between Thiruvalla and Changanacherry. Close to Kuttanad Kumarakom backwaters, close enough to the verdant hills and forests of the Western Ghats. Visit Konni Elephant camp, alleppy kuttanad backwaters, cheruthenaruvi in pattanamthitta."

  # Link custom assets relative to /static
  custom_css = []
  custom_js  = []
  favicon    = "favicon.ico" #Need to update

  # Possibility to disable external/additional fonts
  # Exception: Fontawesome
  disableFonts = false

  # 404 error customization
  [params.error404]
    heading = "Page couldn't be found"
    text = "Please visit [this page](/)"

  # Optional piwik tracking
  #[params.analytics.piwik]
  #  URL = "https://stats.example.com"
  #  ID = "42"
  #  # Track all subdomains with "*.example.com"
  #  domain = "www.example.com"

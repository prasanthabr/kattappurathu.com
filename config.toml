    #  weight = 10

    # postpended links
    [[menu.postpend]]
      url = "http://prasanthabr.github.io/kuttanadan/"
      name = "Tales & Fables"
      weight = 10


  # Hero section
  [params.hero]
    # To change the background image of the hero, replace 'header-bg.jpg' in
    # the 'static/img' folder.
    title = "Welcome to our little slice of God's Own Travancore"
    subtitle = "welcome to the slow lane"
    buttonText = "Stay with Us"


  # Services section
  [params.services]
    enable = true
    title = "What to Expect"
    subtitle = "Kattappurathu is an old bungalow facing the Main Central Road, in the quaint little village of Ezhinjillam (colloquially known as Idinjillam). <br> The property, though not very large, is teeming with life. Local fruit trees like mango, jack fruit, flowering plants that attract butterflies and dragon flies, a flurry of native birds (including, recently, a visiting peahen), squirrels, an odd Iguania, a family of mongoose and a few proud Indian monitor lizards add up to the ‘life’ in the property. Fish grown in a pond within the land and a few varieties of poultry are treated as part of the family. The house overlooks paddy fields of Kuttanadu. In the fields and farm area behind the property, one may encounter a few turtles, owls and beetles. We do encourage our guests to explore our extended property and enjoy nature at its best. We take pride in being a green oasis in the middle of a fast developing region, try to celebrate life, and take care not to harm the animals that make our place their home.<br><br>We offer the staying quarters for our guests on the top floor of our house. The top floor, with two quarters, common areas and common kitchen, is self contained, with independent access and provides relative privacy from our home downstairs.<br><br>Apart from the bungalow, we have an adjacent free standing wooden granary (see the facing picture) that brings nostalgic memories of a grand era of farming in Kuttanad. Till recently we used to keep paddy cultivated in our fields in this granary. Now, we maintain it for our guest to see and our next generation to remember the toil of our ancestors.<br><br>We invite you to visit us with an open mind, be a Kuttanad farmer in spirit and savour in the sounds, smells, sights and experiences of Central Tranvancore, while staying with us as our guests."

    [[params.services.row]]

    [[params.services.row.list]]
      icon = "fa-camera-retro"
      title = "Native Sights"
      description = "We offer the warmth of a home on the banks of extensive paddy fields, where one can witness the kuttanadan sun setting into endless expanse of paddy fields behind coconut trees. An old ara or grannary on the property is unique to the region. A mansion built in the 60s inspired by art deco completes the sights. The larger of our boarding rooms have extensive windows to the paddy fields, which also brings in a light breeze into the house."
      url = "#"

    [[params.services.row.list]]
      icon = "fa-bug"
      title = "Native Flora Fauna"
      description = "We like to think of our home as a green oasis. If you look beyond the two overarching mango trees, you shall find jackfruits, berries, plantain, banana and tamarinds. The property is also home to an eclectic mix of animals and birds. We would encourage you to slow down, savour in the sights and smells that are on offer at our home."
      url = "#"

    [[params.services.row.list]]
      icon = "fa-bell-slash"
      title = "Calm & Quiet"
      description = "The property is right on the main central road in Kerala, but cocooned in the tiny village of Ezhinjillam. This allows you a quiet peaceful slice of Kerala, away from the hustle of a routine Kerala. And if you are indeed feeling the urge to experience the hustle, we encourage you to visit the old markets, steeped in history, with its own canal system, in Changanacherry"
      url = "#"

  # Portfolio section
  [params.portfolio]
    enable = true
    # All projects defined in their own files. You can find example projects
    # at 'exampleSite/data/projects'. Copy the 'projects' folder into the 'data' directory
    # at the root of this Hugo site.
    # For more informtion take a look at the README.
    title = "Around Us.."
    subtitle = "Idinjillam is a small village connecting two growing towns of Changanachery and Thiruvalla, in the Central Travancore region of Kerala. To our west lie the plains and paddy fields of Kuttanad with its interweaving backwaters and rivers. To our east is the famed cardamom hills and forests of the western ghats. Central Travancore is the seat of royalty and culture with quite a few unexplored gems of Kerala.</br></br> For the traveller who wants to take it slow, our home, provides a much needed respite in itself. </br></br> We offer comfortable, safe homestay facilities at Idinjillam at our home."

    [params.portfolio.modal]
      client = "Hotstop"
      distance = "Distance"
      category = "Category"
      buttonText = "Close Location"


    # About section
  [params.about]
    enable = true
    title = "That Point on the Map!"
    subtitle = "Our homestay is in Idinjillam in the Central Travancore region of Kerala, with the kuttanadan paddy fields to our west and the hills of the western ghats to our east."
    endpoint = "Make us the destination itself"

    # The events will be listed from the top to the bottom.
    # All images are stored under 'static/img/about'.
    # Replace them with your own.
    [[params.about.events]]
      img = "1.jpg"
      date = "Kattappurathu"
      title = "Stay in an elegant mansion house"
      description = "This is an elegant, imposing mansion house overlooking paddy fields and lush gardens. It is conveniently connected by road and rail. Its hospitable owners offer a sumptuous base to those who love to get an authentic experience of what God's Own Country has to offer. They have a wealth of experience to advise and help guests personalise their travel experience from paddy fields to backwaters, house boats, elephant rides, temples, churches, mural paintings, art and unparalleled cuisine of Kerala. We welcome you to stay with us."

    [[params.about.events]]
      img = "2.jpg"
      date = "Ara"
      title = "Old wooden granary to store grains"
      description = "The old granary has seen a few summers where grain from the fields that were owned by the hosts, were stored in it after the harvest. In the kuttanad region of Kerala, paddy is the staple crop, where farmers grow paddy twice a year. The rice from the paddy is boiled in large copper vessels and dried in the hot Kerala sun."

    [[params.about.events]]
      img = "3.jpg"
      date = "After the Harvest"
      title = "Ducks, fishes, fisherman and the festival of summer"
      description = "Large paddy fields of the kuttanad region are a sight to behold in all seasons. While the lush green paddy swaying in the wind is ubiquitous in pictures; the explosion of life after the harvest is an equally appealing sight. The flooded fields are filled with fish, birds and ducks and is an experience reserved for those who call this land home."

    [[params.about.events]]
      img = "4.jpg"
      date = "Seasonal fruit trees"
      title = "Under the shade of the mango trees"
      description = "The property, though small, is filled with trees and plants. There are mangoes, a variety of jackfruits and local plaintain that one can enjoy straight from mother nature."


